# ============================================================
#  Wizytówka na Astro (statyka) + nginx + builder (Docker)
#
#  Uruchomienie:
#      docker compose up -d
#      → http://localhost                (nginx serwuje statykę)
#
#  Re-render (jak zrobi to Payload po zapisie):
#      curl -X POST http://localhost/rebuild
#      albo przycisk "Przebuduj stronę" na stronie głównej
#
#  DEVELOPMENT z hot-reload:
#      docker compose --profile dev up web-dev   → http://localhost:4321
#
#  Model:
#    builder  → astro build → releases/build-N → atomowe przepięcie `current`
#    web(nginx)→ serwuje /srv/www/current (stara wersja żyje przez cały build)
# ============================================================

services:
  # ---- web: nginx serwujący statykę z wolumenu ----
  web:
    image: nginx:alpine
    container_name: wizytowka-web
    restart: unless-stopped
    depends_on:
      builder:
        condition: service_healthy      # czeka na pierwszy build
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
      - site-dist:/srv/www:ro           # gotowe pliki (tylko odczyt)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]  # IPv4 (nginx nie słucha na IPv6)
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # ---- builder: buduje statykę i wystawia /rebuild ----
  #  Źródła wpieczone w obraz (Dockerfile.builder) — brak bind-mountu z Windows,
  #  więc build jest szybki. Zmiana treści = przebudowa obrazu buildera:
  #     docker compose build builder && docker compose up -d
  builder:
    build:
      context: ./web
      dockerfile: Dockerfile.builder
    container_name: wizytowka-builder
    restart: unless-stopped
    expose:
      - "8080"                          # widoczny tylko wewnątrz sieci docker
    volumes:
      - site-dist:/srv/www              # tu zapisuje zbudowane wersje
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s                 # pierwszy start: build startowy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # ---- web-dev: Astro dev server z hot-reload (tylko profil "dev") ----
  web-dev:
    image: node:22-alpine
    container_name: wizytowka-web-dev
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "4321:4321"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules

  # ----------------------------------------------------------
  # ETAP 2/3 — backend/API + PostgreSQL (na razie wyłączone)
  # ----------------------------------------------------------
  # api:  { build: ./api, ... }
  # db:   { image: postgres:16-alpine, volumes: [db-data:/var/lib/postgresql/data], ... }

volumes:
  site-dist:              # współdzielone: builder zapisuje, nginx serwuje
  web-node-modules:       # tylko dla web-dev (hot-reload)
  # db-data:
