# ============================================================
#  Etap 1 — wizytówka statyczna serwowana przez nginx
#  Uruchomienie:  docker compose up -d
#  Podgląd:       http://localhost
#  Logi:          docker compose logs -f nginx
#  Zatrzymanie:   docker compose down
# ============================================================

services:
  nginx:
    image: nginx:alpine
    container_name: wizytowka-nginx
    restart: unless-stopped            # kontener sam wstaje po awarii / reboocie
    ports:
      - "80:80"                        # http (na serwerze dojdzie 443 dla https)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro   # nasz konfig
      - ./site:/usr/share/nginx/html:ro                        # pliki strony (tylko do odczytu)
      - ./logs/nginx:/var/log/nginx                            # logi na dysku hosta
    healthcheck:                       # sprawdza, czy nginx faktycznie odpowiada
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:                           # rotacja logów Dockera (nie zapchają dysku)
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

