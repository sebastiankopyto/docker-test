# ============================================================
#  Konfiguracja nginx dla wizytówki (etap 1)
#  - serwuje pliki statyczne z /usr/share/nginx/html
#  - gotowe (zakomentowane) przekierowanie /api do backendu
# ============================================================

server {
    listen 80;
    server_name _;                     # łapie każdą domenę/IP (na serwerze wpiszesz twojadomena.pl)

    root /usr/share/nginx/html;
    index index.html;

    # logi tego serwera (trafiają do ./logs/nginx/ na hoście)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # strona statyczna
    location / {
        try_files $uri $uri/ /index.html;
    }

    # lekki cache dla plików statycznych (css/js/obrazki)
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ----------------------------------------------------------
    # ETAP 2 — przekierowanie ruchu API do backendu
    # Odkomentuj, gdy uruchomisz usługę "api" w docker-compose.yml.
    # ----------------------------------------------------------
    # location /api/ {
    #     proxy_pass http://api:3000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

