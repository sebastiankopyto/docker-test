# ============================================================
#  Konfiguracja nginx — serwuje statykę z współdzielonego wolumenu
#  Root wskazuje na symlink `current`, który builder przepina
#  atomowo po każdym udanym buildzie (zero przerwy).
# ============================================================

server {
    listen 80;
    server_name _;                     # na serwerze wpiszesz twojadomena.pl

    root /srv/www/current;             # symlink → releases/build-N (podmieniany przez builder)
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ----------------------------------------------------------
    # ENDPOINT TESTOWY — wyzwala rebuild przez usługę "builder".
    # UWAGA: tu jest publiczny WYŁĄCZNIE do testów przyciskiem.
    # W produkcji ogranicz go (żeby ktoś nie zajechał serwera buildami):
    #   allow 172.16.0.0/12; deny all;      # tylko sieć wewnętrzna
    #   albo token w nagłówku.
    # Docelowo woła to Payload (hook afterChange), nie przeglądarka.
    # ----------------------------------------------------------
    location = /rebuild {
        proxy_pass http://builder:8080/rebuild;
        proxy_read_timeout 120s;         # build może potrwać kilka-kilkanaście s
    }

    # ETAP 2 — backend/API pod /api (gdy dojdzie formularz)
    # location /api/ {
    #     proxy_pass http://api:3000/;
    # }
}
